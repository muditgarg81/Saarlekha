<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log Maintenance - Saarlekha</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#0059bb',
              light: '#0070ea',
              dark: '#004a9d',
            },
            secondary: {
              DEFAULT: '#006a6a',
            },
            surface: '#f9f9ff',
            border: '#c1c6d7',
            text: {
              primary: '#181c23',
              secondary: '#414754',
            },
            danger: '#ba1a1a',
            success: '#006a6a',
            warning: '#d97706',
          },
          borderRadius: {
            card: '0.75rem',
            input: '0.5rem',
          }
        }
      }
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .tnum {
      font-variant-numeric: tabular-nums;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #c1c6d7;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-surface text-text-primary min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-primary text-white px-4 py-4 sticky top-0 z-50 flex items-center justify-between shadow-md">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center h-8 w-8 rounded-full hover:bg-white/10 active:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-white">arrow_back</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">Log Maintenance</h1>
</div>
<button class="h-8 w-8 flex items-center justify-center rounded-full hover:bg-white/10">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<main class="flex-1 p-4 space-y-5 pb-32">
<!-- Machine Info Section -->
<div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-4">
<div class="grid grid-cols-1 gap-4">
<div class="space-y-1.5">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest px-0.5">Select Machine</label>
<div class="relative">
<select class="appearance-none w-full bg-surface border border-border rounded-input px-3 py-2.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
<option>Loom Machine #04 (L-04)</option>
<option>Stitch Machine #02 (S-02)</option>
<option>Warping Unit #01 (W-01)</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary text-lg">expand_more</span>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest px-0.5">Maintenance Type</label>
<div class="relative">
<select class="appearance-none w-full bg-surface border border-border rounded-input px-3 py-2.5 text-sm font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
<option>Preventative Maintenance</option>
<option>Breakdown Repair</option>
<option>Routine Calibration</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary text-lg">expand_more</span>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest px-0.5">Job Status</label>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center justify-center gap-2 bg-teal-50 text-secondary border-2 border-secondary px-3 py-2.5 rounded-input text-xs font-bold uppercase transition-all shadow-sm">
<span class="material-symbols-outlined text-base">check_circle</span>
            Completed
          </button>
<button class="flex items-center justify-center gap-2 bg-white text-text-secondary border border-border px-3 py-2.5 rounded-input text-xs font-bold uppercase hover:bg-surface transition-all">
<span class="material-symbols-outlined text-base">pending</span>
            In Progress
          </button>
<button class="flex items-center justify-center gap-2 bg-white text-text-secondary border border-border px-3 py-2.5 rounded-input text-xs font-bold uppercase hover:bg-surface transition-all">
<span class="material-symbols-outlined text-base">history</span>
            Open
          </button>
<button class="flex items-center justify-center gap-2 bg-white text-danger border border-danger/30 px-3 py-2.5 rounded-input text-xs font-bold uppercase hover:bg-red-50 transition-all">
<span class="material-symbols-outlined text-base text-danger">warning</span>
            Parts Missing
          </button>
</div>
</div>
</div>
<!-- Dynamic Checklist -->
<div class="space-y-3">
<div class="flex items-center justify-between px-1">
<h2 class="font-bold text-[10px] uppercase tracking-widest text-text-secondary">Maintenance Checklist</h2>
<span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full tnum">2 / 3 COMPLETE</span>
</div>
<div class="space-y-3">
<!-- Checklist 1 -->
<label class="flex items-start gap-4 bg-white p-4 rounded-card border border-border shadow-sm active:bg-surface transition-colors cursor-pointer" for="item1">
<div class="mt-1">
<input checked="" class="rounded border-border text-primary focus:ring-primary h-5 w-5 transition-all" id="item1" type="checkbox"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="font-bold text-text-primary text-sm leading-tight">Lubricated Gears</span>
<span class="material-symbols-outlined text-success text-lg">check_circle</span>
</div>
<p class="text-xs text-text-secondary leading-relaxed">Ensure grease levels are within safe parameters. Check for metal shavings in tray.</p>
</div>
</label>
<!-- Checklist 2 -->
<label class="flex items-start gap-4 bg-white p-4 rounded-card border border-border shadow-sm active:bg-surface transition-colors cursor-pointer" for="item2">
<div class="mt-1">
<input checked="" class="rounded border-border text-primary focus:ring-primary h-5 w-5 transition-all" id="item2" type="checkbox"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="font-bold text-text-primary text-sm leading-tight">Calibrated Sensor Scales</span>
<span class="material-symbols-outlined text-success text-lg">check_circle</span>
</div>
<p class="text-xs text-text-secondary leading-relaxed">Align variation tolerance bounds. Verify with standard 500g weight unit.</p>
</div>
</label>
<!-- Checklist 3 -->
<label class="flex items-start gap-4 bg-white p-4 rounded-card border border-border shadow-sm active:bg-surface transition-colors cursor-pointer" for="item3">
<div class="mt-1">
<input class="rounded border-border text-primary focus:ring-primary h-5 w-5 transition-all" id="item3" type="checkbox"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-center mb-1">
<span class="font-bold text-text-primary text-sm leading-tight text-danger">Inspected Safety Guards</span>
<span class="material-symbols-outlined text-text-secondary/30 text-lg">radio_button_unchecked</span>
</div>
<p class="text-xs text-text-secondary leading-relaxed">Confirm manual override lock remains active and plexiglass is crack-free.</p>
</div>
</label>
</div>
</div>
<!-- Notes Section (Added for high-fidelity) -->
<div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-2">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest px-0.5">Additional Observations</label>
<textarea class="w-full bg-surface border border-border rounded-input px-3 py-2 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-text-secondary/50" placeholder="Enter any specific issues or parts replaced..." rows="3"></textarea>
</div>
</main>
<!-- Sticky Bottom Action Bar -->
<div class="bg-white border-t border-border fixed bottom-0 left-0 right-0 p-4 z-50 pb-8 sm:pb-4 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<button class="w-full bg-primary hover:bg-primary-dark active:scale-[0.98] text-white text-sm font-bold py-3.5 rounded-input shadow-md flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-lg">save</span>
      Save Maintenance Activity
    </button>
</div>
<!-- Bottom Tab Bar -->
<div class="fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-border grid grid-cols-3 z-[60] safe-area-bottom hidden sm:hidden">
<button class="flex flex-col items-center justify-center text-text-secondary gap-0.5">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-primary gap-0.5 border-t-2 border-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">edit_document</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Log Entry</span>
</button>
<button class="flex flex-col items-center justify-center text-text-secondary gap-0.5">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Masters</span>
</button>
</div>
</body></html>
