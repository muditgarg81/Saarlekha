<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Maintenance - Saarlekha</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#0059bb',
              light: '#0070ea',
            },
            secondary: {
              DEFAULT: '#006a6a',
            },
            surface: '#f9f9ff',
            border: '#c1c6d7',
            text: {
              primary: '#181c23',
              secondary: '#414754',
            },
            danger: '#ba1a1a',
            success: '#006a6a',
            pending: '#d97706',
            rejected: '#ba1a1a',
          },
          borderRadius: {
            card: '0.75rem',
            input: '0.5rem',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .tnum {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body class="bg-surface text-text-primary min-h-screen flex flex-col justify-between">
  
  
  <!-- Header -->
  <header class="bg-primary text-white px-4 py-3 sticky top-0 z-50 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button class="text-white hover:text-gray-200">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      </button>
      <h1 class="text-base font-bold">Log Maintenance</h1>
    </div>
  </header>

  <main class="flex-1 p-4 space-y-4 pb-20">
    
    <!-- Maintenance Details Card -->
    <div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-3">
      <div class="grid grid-cols-2 gap-3 text-xs">
        <div>
          <label class="block font-semibold text-text-primary uppercase tracking-wider">Select Machine</label>
          <select class="mt-1 block w-full border border-border rounded px-2.5 py-1.5 focus:outline-none bg-white">
            <option>Loom Machine #04</option>
            <option>Stitch Machine #02</option>
          </select>
        </div>
        <div>
          <label class="block font-semibold text-text-primary uppercase tracking-wider">Maintenance Type</label>
          <select class="mt-1 block w-full border border-border rounded px-2.5 py-1.5 focus:outline-none bg-white">
            <option>Preventative</option>
            <option>Breakdown Repair</option>
          </select>
        </div>
      </div>
      
      <div class="text-xs">
        <label class="block font-semibold text-text-primary uppercase tracking-wider">Status</label>
        <div class="grid grid-cols-4 gap-1.5 mt-1">
          <button class="bg-teal-50 text-secondary border border-secondary px-2 py-1.5 rounded text-[10px] font-bold uppercase text-center">Completed</button>
          <button class="bg-white text-text-secondary border border-border px-2 py-1.5 rounded text-[10px] font-bold uppercase text-center">Open</button>
          <button class="bg-white text-text-secondary border border-border px-2 py-1.5 rounded text-[10px] font-bold uppercase text-center">In Progress</button>
          <button class="bg-white text-text-secondary border border-border px-2 py-1.5 rounded text-[10px] font-bold uppercase text-center">Parts Missing</button>
        </div>
      </div>
    </div>

    <!-- Dynamic Checklist -->
    <div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-3">
      <div class="font-bold text-xs uppercase tracking-wider text-text-primary border-b border-border pb-1.5">
        Custom Checklist Items
      </div>

      <div class="space-y-3 text-xs pt-1">
        
        <!-- Checklist 1 -->
        <div class="flex items-start gap-2.5">
          <input type="checkbox" id="item1" class="mt-0.5 rounded text-primary focus:ring-primary h-4 w-4" checked />
          <div>
            <label for="item1" class="font-bold text-text-primary">Lubricated Gears</label>
            <div class="text-[10px] text-text-secondary">Ensure grease levels are within safe parameters.</div>
          </div>
        </div>

        <!-- Checklist 2 -->
        <div class="flex items-start gap-2.5">
          <input type="checkbox" id="item2" class="mt-0.5 rounded text-primary focus:ring-primary h-4 w-4" checked />
          <div>
            <label for="item2" class="font-bold text-text-primary">Calibrated Sensor Scales</label>
            <div class="text-[10px] text-text-secondary">Align variation tolerance bounds.</div>
          </div>
        </div>

        <!-- Checklist 3 -->
        <div class="flex items-start gap-2.5">
          <input type="checkbox" id="item3" class="mt-0.5 rounded text-primary focus:ring-primary h-4 w-4" />
          <div>
            <label for="item3" class="font-bold text-text-primary">Inspected Safety Guards</label>
            <div class="text-[10px] text-text-secondary">Confirm manual override lock remains active.</div>
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- Sticky Bottom Log Entry Bar -->
  <div class="bg-white border-t border-border fixed bottom-0 left-0 right-0 p-3 z-50">
    <button class="w-full bg-primary hover:bg-primary-light text-white text-sm font-semibold py-2.5 rounded shadow-sm flex items-center justify-center gap-1.5">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
      Save Maintenance Activity
    </button>
  </div>
  

</body>
</html>
