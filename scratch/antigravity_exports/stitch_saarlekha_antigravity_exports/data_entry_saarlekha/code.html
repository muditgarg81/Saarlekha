<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Data Entry - Saarlekha</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#0059bb',
              light: '#0070ea',
              dark: '#00438d',
            },
            secondary: {
              DEFAULT: '#006a6a',
              light: '#008585',
            },
            surface: {
              DEFAULT: '#f9f9ff',
              variant: '#e1e2ec',
            },
            border: '#c1c6d7',
            text: {
              primary: '#181c23',
              secondary: '#414754',
            },
            danger: '#ba1a1a',
            success: '#006a6a',
          },
          borderRadius: {
            card: '0.75rem',
            input: '0.5rem',
          }
        }
      }
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .tnum {
      font-variant-numeric: tabular-nums lining-nums;
    }
    .bottom-nav-active {
      color: #0059bb;
    }
    .bottom-nav-inactive {
      color: #414754;
    }
  </style>
</head>
<body class="bg-surface text-text-primary min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-primary text-white px-4 py-3 sticky top-0 z-50 flex items-center gap-4 shadow-md">
<button class="w-10 h-10 -ml-2 flex items-center justify-center rounded-full active:bg-primary-dark transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="text-base font-bold leading-none">Data Log Entry</h1>
<span class="text-[10px] opacity-80 uppercase tracking-widest mt-1">Industrial Reporting</span>
</div>
</header>
<main class="flex-1 p-4 space-y-4 pb-32">
<!-- Selection Controls -->
<div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-4">
<div class="space-y-1">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest">Entry Format</label>
<div class="relative">
<select class="appearance-none block w-full bg-surface-variant/20 border border-border rounded-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
<option>Daily Quality Report (Weaving)</option>
<option>Production General Sheet</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary text-sm">expand_more</span>
</div>
</div>
<div class="space-y-1">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest">Department</label>
<div class="relative">
<select class="appearance-none block w-full bg-surface-variant/20 border border-border rounded-input px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
<option>Loom / Weaving</option>
<option>Stitching &amp; Packing</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary text-sm">expand_more</span>
</div>
</div>
</div>
<!-- Active Form Entry Section -->
<div class="bg-white rounded-card border border-border shadow-sm overflow-hidden">
<div class="bg-primary/5 px-4 py-2 border-b border-border flex justify-between items-center">
<span class="text-[10px] font-bold text-primary uppercase tracking-widest">Log Parameters</span>
<span class="text-[10px] font-bold text-text-secondary">FORMAT #1.1</span>
</div>
<div class="p-4 space-y-4">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest">Loom No.</label>
<input class="w-full border border-border rounded-input px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary tnum" type="text" value="Loom #04"/>
</div>
<div class="space-y-1">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest">Operator</label>
<div class="relative">
<select class="appearance-none w-full border border-border rounded-input px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-white">
<option>Mudit Garg</option>
<option>Arun Kumar</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary text-sm">expand_more</span>
</div>
</div>
<div class="space-y-1">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest">Recorded (mm)</label>
<input class="w-full border border-border rounded-input px-3 py-2 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary tnum" step="0.1" type="number" value="45.5"/>
</div>
<div class="space-y-1">
<label class="block text-[10px] font-bold text-text-secondary uppercase tracking-widest">Required (mm)</label>
<input class="w-full border border-border rounded-input px-3 py-2 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary tnum" step="0.1" type="number" value="45.0"/>
</div>
</div>
<button class="w-full bg-secondary text-white text-xs font-bold py-3.5 rounded-input flex items-center justify-center gap-2 shadow-sm active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined text-lg">add_circle</span>
          ADD TO BATCH QUEUE
        </button>
</div>
</div>
<!-- High-Contrast Batch Queue -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<h3 class="text-[10px] font-extrabold uppercase tracking-widest text-text-secondary">Batch Queue (2 entries)</h3>
<button class="text-danger text-[10px] font-bold flex items-center gap-1 hover:opacity-80">
<span class="material-symbols-outlined text-xs">delete_sweep</span>
          CLEAR ALL
        </button>
</div>
<div class="space-y-3">
<!-- Entry Card 1 -->
<div class="bg-white rounded-card border-l-4 border-l-primary border border-border shadow-sm p-3 flex justify-between items-center group active:bg-primary/5 transition-colors">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="bg-primary/10 text-primary text-[10px] font-extrabold px-1.5 py-0.5 rounded tnum">#04</span>
<span class="text-xs font-bold">Mudit Garg</span>
</div>
<div class="flex items-center gap-3 mt-1">
<div class="flex flex-col">
<span class="text-[9px] text-text-secondary uppercase font-bold leading-none">Measured</span>
<span class="text-xs font-bold tnum">45.5 mm</span>
</div>
<div class="h-6 w-[1px] bg-border/50"></div>
<div class="flex flex-col">
<span class="text-[9px] text-text-secondary uppercase font-bold leading-none">Variance</span>
<span class="text-xs font-bold text-danger tnum">+0.5</span>
</div>
</div>
</div>
<div class="flex gap-2">
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-variant/30 text-primary active:bg-primary/20">
<span class="material-symbols-outlined text-lg">edit_note</span>
</button>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-variant/30 text-danger active:bg-danger/10">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
</div>
<!-- Entry Card 2 -->
<div class="bg-white rounded-card border-l-4 border-l-secondary border border-border shadow-sm p-3 flex justify-between items-center group active:bg-primary/5 transition-colors">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="bg-secondary/10 text-secondary text-[10px] font-extrabold px-1.5 py-0.5 rounded tnum">#08</span>
<span class="text-xs font-bold">Arun Kumar</span>
</div>
<div class="flex items-center gap-3 mt-1">
<div class="flex flex-col">
<span class="text-[9px] text-text-secondary uppercase font-bold leading-none">Measured</span>
<span class="text-xs font-bold tnum">44.9 mm</span>
</div>
<div class="h-6 w-[1px] bg-border/50"></div>
<div class="flex flex-col">
<span class="text-[9px] text-text-secondary uppercase font-bold leading-none">Variance</span>
<span class="text-xs font-bold text-secondary tnum">-0.1</span>
</div>
</div>
</div>
<div class="flex gap-2">
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-variant/30 text-primary active:bg-primary/20">
<span class="material-symbols-outlined text-lg">edit_note</span>
</button>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-variant/30 text-danger active:bg-danger/10">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Controls & Navigation -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<!-- Submit Bar -->
<div class="bg-white border-t border-border p-3 px-4 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<button class="w-full bg-primary text-white text-sm font-bold py-3.5 rounded-input shadow-md flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">cloud_upload</span>
        SUBMIT BATCH (2 ENTRIES)
      </button>
</div>
<!-- Standard Bottom Nav -->
<nav class="bg-white border-t border-border px-6 py-2 flex justify-between items-center pb-safe">
<button class="flex flex-col items-center gap-1 bottom-nav-inactive">
<span class="material-symbols-outlined text-[22px]">dashboard</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 bottom-nav-active">
<span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1">edit_square</span>
<span class="text-[10px] font-bold">Log Data</span>
</button>
<button class="flex flex-col items-center gap-1 bottom-nav-inactive">
<span class="material-symbols-outlined text-[22px]">inventory_2</span>
<span class="text-[10px] font-medium">History</span>
</button>
<button class="flex flex-col items-center gap-1 bottom-nav-inactive">
<span class="material-symbols-outlined text-[22px]">person</span>
<span class="text-[10px] font-medium">Profile</span>
</button>
</nav>
</div>
</body></html>
