version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saarlekha
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saarlekha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 admin password;
      /usr/bin/mc rm -r --force myminio/saarlekha;
      /usr/bin/mc mb myminio/saarlekha;
      /usr/bin/mc policy set public myminio/saarlekha;
      exit 0;
      "

volumes:
  pgdata:
  minio_data:
