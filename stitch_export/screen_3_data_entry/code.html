<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Entry - Saarlekha</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#0059bb',
              light: '#0070ea',
            },
            secondary: {
              DEFAULT: '#006a6a',
            },
            surface: '#f9f9ff',
            border: '#c1c6d7',
            text: {
              primary: '#181c23',
              secondary: '#414754',
            },
            danger: '#ba1a1a',
            success: '#006a6a',
            pending: '#d97706',
            rejected: '#ba1a1a',
          },
          borderRadius: {
            card: '0.75rem',
            input: '0.5rem',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .tnum {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body class="bg-surface text-text-primary min-h-screen flex flex-col justify-between">
  
  
  <!-- Header -->
  <header class="bg-primary text-white px-4 py-3 sticky top-0 z-50 flex items-center gap-3">
    <button class="text-white hover:text-gray-200">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </button>
    <h1 class="text-base font-bold">Data Log Entry</h1>
  </header>

  <main class="flex-1 p-4 space-y-4 pb-24">
    <!-- Dropdowns Card -->
    <div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-3">
      <div>
        <label class="block text-xs font-semibold text-text-primary uppercase tracking-wider">Select Format</label>
        <select class="mt-1 block w-full border border-border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          <option>Daily Quality Report (Weaving)</option>
          <option>Production General Sheet</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-text-primary uppercase tracking-wider">Department</label>
        <select class="mt-1 block w-full border border-border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          <option>Loom / Weaving</option>
          <option>Stitching & Packing</option>
        </select>
      </div>
    </div>

    <!-- Active Form Entries -->
    <div class="bg-white p-4 rounded-card border border-border shadow-sm space-y-4">
      <div class="font-bold text-xs uppercase tracking-wider text-text-primary border-b border-border pb-1.5 flex justify-between">
        <span>Log Parameters</span>
        <span class="text-primary-light">Format #1.1</span>
      </div>

      <div class="grid grid-cols-2 gap-3 text-xs">
        <div>
          <label class="block font-medium text-text-primary">Loom No.</label>
          <input type="text" class="mt-1 block w-full border border-border rounded px-2.5 py-1.5 focus:outline-none" value="Loom #04" />
        </div>
        <div>
          <label class="block font-medium text-text-primary">Operator</label>
          <select class="mt-1 block w-full border border-border rounded px-2.5 py-1.5 focus:outline-none bg-white">
            <option>Mudit Garg</option>
            <option>Arun Kumar</option>
          </select>
        </div>
        <div>
          <label class="block font-medium text-text-primary">Recorded Size (mm)</label>
          <input type="number" class="mt-1 block w-full border border-border rounded px-2.5 py-1.5 focus:outline-none" value="45.5" />
        </div>
        <div>
          <label class="block font-medium text-text-primary">Required Size (mm)</label>
          <input type="number" class="mt-1 block w-full border border-border rounded px-2.5 py-1.5 focus:outline-none" value="45.0" />
        </div>
      </div>

      <button class="w-full bg-secondary hover:bg-teal-700 text-white text-xs font-semibold py-2 rounded flex items-center justify-center gap-1">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add to Batch Queue
      </button>
    </div>

    <!-- Batch Queue Preview -->
    <div class="bg-white rounded-card border border-border shadow-sm p-4 space-y-2">
      <div class="flex justify-between items-center">
        <h3 class="text-xs font-bold uppercase tracking-wider text-text-primary">Batch Queue (2 rows)</h3>
        <button class="text-danger hover:underline text-[10px] font-bold">Clear All</button>
      </div>

      <!-- Mobile List Cards for Queue -->
      <div class="space-y-2 pt-1 text-xs">
        
        <!-- Row 1 -->
        <div class="bg-surface p-2.5 rounded border border-border flex justify-between items-center">
          <div>
            <div class="font-bold">Loom #04 &bull; Mudit Garg</div>
            <div class="text-[10px] text-text-secondary mt-0.5">Size: 45.5 / Req: 45.0 (Diff: +0.5)</div>
          </div>
          <div class="flex gap-2">
            <button class="text-primary font-semibold hover:underline">Edit</button>
            <button class="text-danger font-semibold hover:underline">Del</button>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="bg-surface p-2.5 rounded border border-border flex justify-between items-center">
          <div>
            <div class="font-bold">Loom #08 &bull; Arun Kumar</div>
            <div class="text-[10px] text-text-secondary mt-0.5">Size: 44.9 / Req: 45.0 (Diff: -0.1)</div>
          </div>
          <div class="flex gap-2">
            <button class="text-primary font-semibold hover:underline">Edit</button>
            <button class="text-danger font-semibold hover:underline">Del</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Sticky Bottom Submit Bar -->
  <div class="bg-white border-t border-border fixed bottom-0 left-0 right-0 p-3 z-50 shadow-lg">
    <button class="w-full bg-primary hover:bg-primary-light text-white text-sm font-semibold py-2.5 rounded shadow-sm flex items-center justify-center gap-1.5">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      Submit Batch (2 entries)
    </button>
  </div>
  

</body>
</html>
